services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: anti-pollution-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-anti_pollution}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-anti_pollution}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anti-pollution-network

volumes:
  postgres_data:
    driver: local

networks:
  anti-pollution-network:
    driver: bridge

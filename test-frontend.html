<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ola Maps API Test - Frontend Mock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .test-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        
        .test-card:hover {
            transform: translateY(-5px);
        }
        
        .test-card h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.3em;
        }
        
        .test-card p {
            color: #666;
            margin-bottom: 15px;
            font-size: 0.9em;
        }
        
        .test-button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .test-button:hover {
            opacity: 0.9;
        }
        
        .test-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.9em;
            display: none;
        }
        
        .result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .result.loading {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
            display: block;
        }
        
        .route-info {
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
            font-size: 0.85em;
        }
        
        .route-info strong {
            color: #667eea;
        }
        
        .stats {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        
        .stats h2 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .stat-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗺️ Ola Maps API Test</h1>
        
        <div class="test-grid" id="testGrid"></div>
        
        <div class="stats">
            <h2>Test Statistics</h2>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="successCount">0</div>
                    <div class="stat-label">Successful</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="failedCount">0</div>
                    <div class="stat-label">Failed</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalRoutes">0</div>
                    <div class="stat-label">Total Routes</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api/score';
        
        const testCases = [
            {
                city: "Mumbai",
                description: "CST to Bandra",
                originLat: 19.0760,
                originLng: 72.8777,
                destLat: 19.0850,
                destLng: 72.8950
            },
            {
                city: "Mumbai",
                description: "Andheri to Powai",
                originLat: 19.1136,
                originLng: 72.8697,
                destLat: 19.1176,
                destLng: 72.9060
            },
            {
                city: "Delhi",
                description: "Connaught Place to India Gate",
                originLat: 28.6139,
                originLng: 77.2090,
                destLat: 28.6280,
                destLng: 77.2200
            },
            {
                city: "Delhi",
                description: "Karol Bagh to Chandni Chowk",
                originLat: 28.6519,
                originLng: 77.1909,
                destLat: 28.6507,
                destLng: 77.2334
            },
            {
                city: "Bangalore",
                description: "MG Road to Koramangala",
                originLat: 12.9716,
                originLng: 77.5946,
                destLat: 12.9352,
                destLng: 77.6245
            },
            {
                city: "Pune",
                description: "Shivajinagar to Hinjewadi",
                originLat: 18.5304,
                originLng: 73.8567,
                destLat: 18.5912,
                destLng: 73.7396
            },
            {
                city: "Kolkata",
                description: "Park Street to Howrah",
                originLat: 22.5726,
                originLng: 88.3639,
                destLat: 22.5851,
                destLng: 88.3468
            },
            {
                city: "Hyderabad",
                description: "Hitech City to Charminar",
                originLat: 17.4435,
                originLng: 78.3772,
                destLat: 17.3616,
                destLng: 78.4747
            },
            {
                city: "Chennai",
                description: "T Nagar to Marina Beach",
                originLat: 13.0418,
                originLng: 80.2341,
                destLat: 13.0499,
                destLng: 80.2824
            }
        ];

        let stats = { success: 0, failed: 0, totalRoutes: 0 };

        function updateStats() {
            document.getElementById('successCount').textContent = stats.success;
            document.getElementById('failedCount').textContent = stats.failed;
            document.getElementById('totalRoutes').textContent = stats.totalRoutes;
        }

        async function testRoute(testCase, resultDiv, button) {
            resultDiv.className = 'result loading';
            resultDiv.innerHTML = '⏳ Testing...';
            button.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        originLat: testCase.originLat,
                        originLng: testCase.originLng,
                        destLat: testCase.destLat,
                        destLng: testCase.destLng
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Request failed');
                }

                const routes = await response.json();
                
                resultDiv.className = 'result success';
                resultDiv.innerHTML = `
                    ✅ Success! Got ${routes.length} route(s)
                    ${routes.map((route, i) => `
                        <div class="route-info">
                            <strong>Route ${i + 1}:</strong><br>
                            PES: ${route.pes.toFixed(2)} | 
                            Distance: ${route.distance.toFixed(2)}km | 
                            Duration: ${route.duration.toFixed(0)}min<br>
                            AQI: ${route.aqi.toFixed(0)} | 
                            Points: ${route.polyline.length}
                        </div>
                    `).join('')}
                `;

                stats.success++;
                stats.totalRoutes += routes.length;
                updateStats();

            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `❌ Error: ${error.message}`;
                stats.failed++;
                updateStats();
            } finally {
                button.disabled = false;
            }
        }

        function createTestCard(testCase, index) {
            const card = document.createElement('div');
            card.className = 'test-card';
            
            card.innerHTML = `
                <h3>${testCase.city}</h3>
                <p>${testCase.description}</p>
                <p style="font-size: 0.8em; color: #999;">
                    Origin: ${testCase.originLat}, ${testCase.originLng}<br>
                    Dest: ${testCase.destLat}, ${testCase.destLng}
                </p>
                <button class="test-button" id="btn-${index}">Test Route</button>
                <div class="result" id="result-${index}"></div>
            `;
            
            return card;
        }

        // Initialize
        const grid = document.getElementById('testGrid');
        testCases.forEach((testCase, index) => {
            const card = createTestCard(testCase, index);
            grid.appendChild(card);
            
            document.getElementById(`btn-${index}`).addEventListener('click', () => {
                const resultDiv = document.getElementById(`result-${index}`);
                const button = document.getElementById(`btn-${index}`);
                testRoute(testCase, resultDiv, button);
            });
        });

        updateStats();
    </script>
</body>
</html>
